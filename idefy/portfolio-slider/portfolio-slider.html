<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="portfolio-slider.css">
  <title>Idefy Reels Slider</title>
</head>
<body>

<section class="reel-slider" aria-label="Campaign reels">

  <button class="reel-arrow reel-arrow--prev" aria-label="Previous">&#8249;</button>

  <div class="reel-track-wrap">
    <div class="reel-track">

      <div class="reel-slide"
           data-embed="https://www.instagram.com/p/CrnoYVNLFQw/embed/">
        <div class="reel-cover-wrap">
          <img src="https://idefy2.progressnet.gr/wp-content/uploads/2026/05/REELS-COVER-3.png"
               alt="Campaign reel 1" loading="lazy">
          <button class="reel-play-btn" aria-label="Play reel"></button>
        </div>
      </div>

      <div class="reel-slide"
           data-embed="https://www.instagram.com/p/CrbUYFcR1cD/embed/">
        <div class="reel-cover-wrap">
          <img src="https://idefy2.progressnet.gr/wp-content/uploads/2026/05/REELS-COVER-2.png"
               alt="Campaign reel 2" loading="lazy">
          <button class="reel-play-btn" aria-label="Play reel"></button>
        </div>
      </div>

      <div class="reel-slide"
           data-embed="https://www.instagram.com/p/CrgTTFigBMp/embed/">
        <div class="reel-cover-wrap">
          <img src="https://idefy2.progressnet.gr/wp-content/uploads/2026/05/REELS-COVER-1.png"
               alt="Campaign reel 3" loading="lazy">
          <button class="reel-play-btn" aria-label="Play reel"></button>
        </div>
      </div>

    </div>
  </div>

  <button class="reel-arrow reel-arrow--next" aria-label="Next">&#8250;</button>

</section>

<script src="portfolio-slider.js"></script>
</body>
</html>
