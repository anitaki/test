<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Document</title>
  <style>
body {
  background-color: blueviolet;
}

/* Distillation table  */
.distillation-table, .distillation-header-row, .distillation-header-cell {
  border: 1px solid white;
  border-collapse: collapse;
  color: white;
  font-family: Manrope, Arial, Helvetica, sans-serif;
  font-weight: 400;
}

.distillation-row, .distillation-header-row {
  height: 5rem;
}

.distillation-header-cell,
.distillation-cell {
  min-width: 8rem;
}


.distillation-header-icon,
.distillation-icon {
  width: 25px;
}

.distillation-cell {
  text-align: center;
  border-bottom: 1px solid white;
}

/* Thermometer header in table */
.thermo-div {
  display: flex;
  align-items: center;
  justify-content: center;
}

.thermo-div p {
  font-size: 0.5rem;
  text-align: left;
}

.thermo-div img {
  width: 40px;
}

  </style>
</head>

<body>
<table class="distillation-table">
  <tr class="distillation-header-row">
    <th class="distillation-header-cell"><div class="thermo-div">
      <img class="distillation-header-icon" src="https://stoupakis.progressnet.gr/wp-content/uploads/2025/10/thermometer.png" alt="thermometer">
      <p>
        Distillation<br>Degree
      </p>
    </div></th>
    <th class="distillation-header-cell">50ml</th>
    <th class="distillation-header-cell">200ml</th>
    <th class="distillation-header-cell">500ml</th>

    <th class="distillation-header-cell">1L</th>
    <th class="distillation-header-cell">1.5L</th>
  </tr>
  <tr class="distillation-row">

 </tr>

    <td class="distillation-cell"><img class="distillation-icon" src="https://stoupakis.progressnet.gr/wp-content/uploads/2025/10/checkmark.png" alt="checkmark"></td>
 </tr>
